<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>

    <!-- Back document gradient -->
    <linearGradient id="backDoc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1a26"/>
      <stop offset="100%" stop-color="#07101a"/>
    </linearGradient>

    <!-- Front document gradient -->
    <linearGradient id="frontDoc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14233a"/>
      <stop offset="100%" stop-color="#0A0F1C"/>
    </linearGradient>

    <!-- Fold gradient -->
    <linearGradient id="foldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Titlebar tint -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.04"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Green ambient glow behind front doc -->
    <filter id="docGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip front doc shape -->
    <clipPath id="frontClip">
      <path d="M 8 4 L 40 4 L 53 17 L 53 59 L 8 59 Z"/>
    </clipPath>

  </defs>

  <!-- ========== BACK DOCUMENT (stacked, offset) ========== -->
  <path d="M 13 9 L 45 9 L 58 22 L 58 62 L 13 62 Z"
        fill="url(#backDoc)"
        stroke="#10b981" stroke-width="1" stroke-linejoin="round" opacity="0.45"/>
  <!-- Back doc fold -->
  <path d="M 45 9 L 45 22 L 58 22 Z" fill="#059669" opacity="0.35"/>

  <!-- ========== FRONT DOCUMENT ========== -->

  <!-- Subtle ambient glow behind the front doc -->
  <path d="M 8 4 L 40 4 L 53 17 L 53 59 L 8 59 Z"
        fill="#10b981" opacity="0.07" filter="url(#docGlow)" transform="translate(0,1)"/>

  <!-- Front doc body -->
  <path d="M 8 4 L 40 4 L 53 17 L 53 59 L 8 59 Z" fill="url(#frontDoc)"/>

  <!-- Terminal titlebar strip (clipped to doc shape) -->
  <rect x="8" y="4" width="45" height="13" fill="url(#titleGrad)" clip-path="url(#frontClip)"/>

  <!-- Titlebar separator -->
  <line x1="8" y1="17" x2="40" y2="17" stroke="#10b981" stroke-width="0.8" opacity="0.35"/>

  <!-- Terminal dots (macOS style) -->
  <circle cx="15" cy="10.5" r="2.2" fill="#f87171" opacity="0.85"/>
  <circle cx="21.5" cy="10.5" r="2.2" fill="#fbbf24" opacity="0.85"/>
  <circle cx="28" cy="10.5" r="2.2" fill="#10b981" opacity="0.95"/>

  <!-- ========== FOLD CORNER ========== -->
  <!-- Shadow underneath fold -->
  <path d="M 40 4 L 40 17 L 53 17 Z" fill="#000" opacity="0.4"/>
  <!-- Glowing fold -->
  <path d="M 40 4 L 40 17 L 53 17 Z" fill="url(#foldGrad)" filter="url(#glow)"/>
  <!-- Fold crease edge -->
  <path d="M 40 4 L 40 17 L 53 17" stroke="#6ee7b7" stroke-width="0.7" opacity="0.5" fill="none" stroke-linejoin="round"/>

  <!-- Front doc border -->
  <path d="M 8 4 L 40 4 L 53 17 L 53 59 L 8 59 Z"
        stroke="#10b981" stroke-width="1.6" stroke-linejoin="round" opacity="0.85"/>

  <!-- ========== CONTENT AREA ========== -->

  <!-- Terminal prompt chevron ">" -->
  <path d="M 14 28 L 18 31.5 L 14 35" stroke="#10b981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!-- Cursor block after the ">" -->
  <rect x="20" y="28.5" width="4" height="5.5" rx="0.8" fill="#10b981" opacity="0.75"/>

  <!-- Code line 2 -->
  <rect x="14" y="40" width="30" height="2.2" rx="1.1" fill="#10b981" opacity="0.55"/>

  <!-- Code line 3 -->
  <rect x="14" y="46" width="22" height="2.2" rx="1.1" fill="#10b981" opacity="0.38"/>

  <!-- Code line 4 (shortest) -->
  <rect x="14" y="52" width="14" height="2.2" rx="1.1" fill="#10b981" opacity="0.22"/>

</svg>
