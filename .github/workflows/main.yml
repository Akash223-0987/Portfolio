name: Keep Server Alive

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:         # manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping server
        run: |
          echo "Pinging server to keep it alive..."
          curl -s https://akash-portfolio-backend-fgtm.onrender.com > /dev/null
